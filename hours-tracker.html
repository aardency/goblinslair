<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hours Tracker</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; }
input, button { margin: 5px; padding: 8px; }
table { border-collapse: collapse; width: 100%; margin-top: 20px; }
th, td { border: 1px solid #ddd; padding: 8px; }
th { background-color: #f4f4f4; }
</style>
</head>
<body>

<h2>Hours Tracker</h2>

<input type="date" id="date">
<input type="number" id="hours" placeholder="Hours">
<input type="text" id="project" placeholder="Project">
<input type="text" id="task" placeholder="Task">
<input type="text" id="note" placeholder="Note">
<button onclick="addEntry()">Add Entry</button>

<table>
<thead>
<tr>
<th>Date</th><th>Hours</th><th>Project</th><th>Task</th><th>Note</th><th>Delete</th>
</tr>
</thead>
<tbody id="entries"></tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const SUPABASE_URL = "https://lbsfllvotajlgvjidfdf.supabase.co";
const SUPABASE_KEY = "sb_publishable_RVZImf6MFUn6S0ySDGlZwg_fDxgNls1";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadEntries() {
  const { data } = await client.from('time_entries').select('*').order('created_at', { ascending: false });
  const table = document.getElementById('entries');
  table.innerHTML = '';
  data.forEach(e => {
    const row = `<tr>
      <td>${e.entry_date}</td>
      <td>${e.hours}</td>
      <td>${e.project || ''}</td>
      <td>${e.task || ''}</td>
      <td>${e.note || ''}</td>
      <td><button onclick="deleteEntry('${e.id}')">X</button></td>
    </tr>`;
    table.innerHTML += row;
  });
}

async function addEntry() {
  const entry = {
    entry_date: document.getElementById('date').value,
    hours: parseFloat(document.getElementById('hours').value),
    project: document.getElementById('project').value,
    task: document.getElementById('task').value,
    note: document.getElementById('note').value
  };
  await client.from('time_entries').insert([entry]);
  loadEntries();
}

async function deleteEntry(id) {
  await client.from('time_entries').delete().eq('id', id);
  loadEntries();
}

loadEntries();
</script>

</body>
</html>
