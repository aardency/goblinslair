<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hours Tracker</title>
  <style>
    :root {
      --bg: #f7f7f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #111827;
      --accentText: #ffffff;
      --danger: #b91c1c;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }

    h1 {
      font-size: 20px;
      margin: 0 0 6px;
    }

    .sub {
      color: var(--muted);
      font-size: 13px;
      margin: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .grid-1 {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input, textarea, button, select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      color: var(--text);
    }

    textarea {
      min-height: 72px;
      resize: vertical;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    button {
      width: auto;
      cursor: pointer;
      background: var(--accent);
      color: var(--accentText);
      border-color: var(--accent);
      font-weight: 700;
    }

    button.secondary {
      background: #fff;
      color: var(--text);
      border-color: var(--border);
      font-weight: 600;
    }

    button.danger {
      background: #fff;
      color: var(--danger);
      border-color: #fecaca;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .stat {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: #fff;
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 700;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 800;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 14px;
    }

    th, td {
      text-align: left;
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .empty {
      color: var(--muted);
      font-size: 14px;
      margin-top: 8px;
    }

    .small {
      font-size: 12px;
      color: var(--muted);
    }

    .row-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    @media (max-width: 640px) {
      .grid, .stats {
        grid-template-columns: 1fr;
      }

      th:nth-child(4), td:nth-child(4) {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Hours Tracker</h1>
      <p class="sub">Simple, embeddable, and saved in your browser.</p>

      <div class="grid">
        <div>
          <label for="date">Date</label>
          <input id="date" type="date" />
        </div>
        <div>
          <label for="hours">Hours</label>
          <input id="hours" type="number" min="0" max="24" step="0.25" placeholder="e.g. 2.5" />
        </div>
      </div>

      <div class="grid">
        <div>
          <label for="project">Project / Category</label>
          <input id="project" type="text" placeholder="e.g. Client work" />
        </div>
        <div>
          <label for="task">Task</label>
          <input id="task" type="text" placeholder="e.g. Writing, meetings, design" />
        </div>
      </div>

      <div class="grid-1">
        <div>
          <label for="note">Note</label>
          <textarea id="note" placeholder="Optional details"></textarea>
        </div>
      </div>

      <div class="actions">
        <button id="addBtn">Add entry</button>
        <button id="exportBtn" class="secondary">Export CSV</button>
        <button id="clearBtn" class="danger">Clear all</button>
      </div>
    </div>

    <div class="card">
      <div class="stats">
        <div class="stat">
          <div class="stat-label">This week</div>
          <div class="stat-value" id="weekTotal">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">This month</div>
          <div class="stat-value" id="monthTotal">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">All time</div>
          <div class="stat-value" id="allTotal">0</div>
        </div>
      </div>
      <div class="small" style="margin-top:10px;">Tip: this widget stores data in localStorage, so it stays saved in the same browser.</div>
    </div>

    <div class="card">
      <h1 style="font-size:18px; margin-bottom: 0;">Recent entries</h1>
      <div id="tableWrap"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'startme_hours_tracker_entries_v1';

    const els = {
      date: document.getElementById('date'),
      hours: document.getElementById('hours'),
      project: document.getElementById('project'),
      task: document.getElementById('task'),
      note: document.getElementById('note'),
      addBtn: document.getElementById('addBtn'),
      exportBtn: document.getElementById('exportBtn'),
      clearBtn: document.getElementById('clearBtn'),
      weekTotal: document.getElementById('weekTotal'),
      monthTotal: document.getElementById('monthTotal'),
      allTotal: document.getElementById('allTotal'),
      tableWrap: document.getElementById('tableWrap')
    };

    function todayISO() {
      const d = new Date();
      const offset = d.getTimezoneOffset();
      const local = new Date(d.getTime() - offset * 60000);
      return local.toISOString().slice(0, 10);
    }

    function getEntries() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveEntries(entries) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }

    function startOfWeek(date) {
      const d = new Date(date + 'T00:00:00');
      const day = d.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      d.setDate(d.getDate() + diff);
      d.setHours(0, 0, 0, 0);
      return d;
    }

    function endOfWeek(date) {
      const s = startOfWeek(date);
      const e = new Date(s);
      e.setDate(s.getDate() + 6);
      e.setHours(23, 59, 59, 999);
      return e;
    }

    function parseEntryDate(dateStr) {
      return new Date(dateStr + 'T12:00:00');
    }

    function formatHours(value) {
      const n = Number(value || 0);
      return Number.isInteger(n) ? String(n) : n.toFixed(2).replace(/\.00$/, '');
    }

    function render() {
      const entries = getEntries().sort((a, b) => (a.date < b.date ? 1 : -1));
      const now = new Date();
      const sow = startOfWeek(todayISO());
      const eow = endOfWeek(todayISO());
      const month = now.getMonth();
      const year = now.getFullYear();

      let week = 0, monthTotal = 0, all = 0;

      for (const entry of entries) {
        const hours = Number(entry.hours) || 0;
        const d = parseEntryDate(entry.date);
        all += hours;
        if (d >= sow && d <= eow) week += hours;
        if (d.getMonth() === month && d.getFullYear() === year) monthTotal += hours;
      }

      els.weekTotal.textContent = formatHours(week);
      els.monthTotal.textContent = formatHours(monthTotal);
      els.allTotal.textContent = formatHours(all);

      if (!entries.length) {
        els.tableWrap.innerHTML = '<div class="empty">No entries yet.</div>';
        return;
      }

      const rows = entries.map((entry, index) => `
        <tr>
          <td>${escapeHtml(entry.date)}</td>
          <td>${escapeHtml(formatHours(entry.hours))}</td>
          <td>
            <strong>${escapeHtml(entry.project || '—')}</strong><br>
            <span class="small">${escapeHtml(entry.task || '')}</span>
          </td>
          <td>${escapeHtml(entry.note || '')}</td>
          <td>
            <div class="row-actions">
              <button class="danger" style="padding:6px 10px; width:auto;" onclick="deleteEntry('${entry.id}')">Delete</button>
            </div>
          </td>
        </tr>
      `).join('');

      els.tableWrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Hours</th>
              <th>Project / Task</th>
              <th>Note</th>
              <th></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function resetForm() {
      els.date.value = todayISO();
      els.hours.value = '';
      els.project.value = '';
      els.task.value = '';
      els.note.value = '';
    }

    function addEntry() {
      const date = els.date.value;
      const hours = parseFloat(els.hours.value);
      const project = els.project.value.trim();
      const task = els.task.value.trim();
      const note = els.note.value.trim();

      if (!date) {
        alert('Please choose a date.');
        return;
      }
      if (!Number.isFinite(hours) || hours <= 0) {
        alert('Please enter valid hours greater than 0.');
        return;
      }

      const entries = getEntries();
      entries.push({
        id: crypto.randomUUID(),
        date,
        hours,
        project,
        task,
        note
      });
      saveEntries(entries);
      resetForm();
      render();
    }

    function deleteEntry(id) {
      const next = getEntries().filter(entry => entry.id !== id);
      saveEntries(next);
      render();
    }

    function exportCSV() {
      const entries = getEntries();
      if (!entries.length) {
        alert('No entries to export yet.');
        return;
      }

      const header = ['Date', 'Hours', 'Project', 'Task', 'Note'];
      const lines = [header.join(',')].concat(entries.map(entry => [
        entry.date,
        entry.hours,
        csvEscape(entry.project),
        csvEscape(entry.task),
        csvEscape(entry.note)
      ].join(',')));

      const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'hours-tracker-export.csv';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function csvEscape(value) {
      const v = String(value || '');
      return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v;
    }

    els.addBtn.addEventListener('click', addEntry);
    els.exportBtn.addEventListener('click', exportCSV);
    els.clearBtn.addEventListener('click', () => {
      if (!getEntries().length) return;
      if (confirm('Clear all tracked hours? This cannot be undone.')) {
        localStorage.removeItem(STORAGE_KEY);
        render();
      }
    });

    window.deleteEntry = deleteEntry;
    resetForm();
    render();
  </script>
</body>
</html>
